name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write      # push tags and create GitHub releases
      id-token: write      # OIDC token required for SLSA provenance attestation
      attestations: write  # write the attestation record to the repository
      issues: write        # semantic-release comments on resolved issues
      pull-requests: write # semantic-release comments on merged pull requests
      models: read         # GitHub Models inference for communique release notes

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Cache disabled: this workflow publishes artifacts, so a poisoned
          # cache entry could tamper with the release build.
          cache: false

      - name: Test
        run: mise run test:ci

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package
        if: steps.release.outputs.new_release_published == 'true'
        run: mise run package

      - name: Sign
        if: steps.release.outputs.new_release_published == 'true'
        run: mise run sign
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}

      - name: Generate release notes
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          communique generate "v${RELEASE_VERSION}" \
            --provider openai \
            --base-url https://models.github.ai/inference \
            --model gpt-4o \
            --output notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.new_release_version }}

      - name: Publish release
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          gh release create "v${RELEASE_VERSION}" \
            YLD.zip \
            YLD.zip.minisig \
            --notes-file notes.md \
            --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.new_release_version }}

      - name: Attest
        if: steps.release.outputs.new_release_published == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: YLD.zip
