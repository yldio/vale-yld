# StylesPath points to the repo root so Vale finds the YLD/ directory directly.
# When using this as a package, set StylesPath to your styles directory and
# add the Packages URL instead:
# Packages = https://github.com/yldio/vale-yld/releases/latest/download/YLD.zip
StylesPath = .
MinAlertLevel = suggestion

[*.md]
BasedOnStyles = YLD

[*.{mdx,txt}]
BasedOnStyles = YLD

[README.md]
BasedOnStyles =

[docs/*.md]
BasedOnStyles =
